<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simply MCP - Shareholder Presentation</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0f;
      color: #fff;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    #root {
      width: 100vw;
      height: 100vh;
    }

    /* Gradient backgrounds */
    .bg-gradient-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .bg-gradient-dark {
      background: linear-gradient(180deg, #0a0a0f 0%, #1a1a2e 100%);
    }

    .bg-gradient-blue {
      background: linear-gradient(135deg, #1e3a5f 0%, #0a0a0f 100%);
    }

    .bg-gradient-purple {
      background: linear-gradient(135deg, #2d1b4e 0%, #0a0a0f 100%);
    }

    .bg-gradient-green {
      background: linear-gradient(135deg, #1a3a2a 0%, #0a0a0f 100%);
    }

    .bg-gradient-orange {
      background: linear-gradient(135deg, #3d2a1a 0%, #0a0a0f 100%);
    }

    /* Glow effects */
    .glow-purple {
      box-shadow: 0 0 60px rgba(102, 126, 234, 0.3);
    }

    .glow-text {
      text-shadow: 0 0 40px rgba(102, 126, 234, 0.5);
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    .animate-fade-in {
      animation: fadeInUp 0.8s ease-out forwards;
    }

    .animate-delay-1 { animation-delay: 0.1s; }
    .animate-delay-2 { animation-delay: 0.2s; }
    .animate-delay-3 { animation-delay: 0.3s; }
    .animate-delay-4 { animation-delay: 0.4s; }
    .animate-delay-5 { animation-delay: 0.5s; }

    /* Code blocks */
    .code-block {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 14px;
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .code-keyword { color: #c792ea; }
    .code-string { color: #c3e88d; }
    .code-type { color: #82aaff; }
    .code-comment { color: #546e7a; }
    .code-function { color: #82aaff; }

    /* Cards */
    .feature-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 24px;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .feature-card:hover {
      border-color: rgba(102, 126, 234, 0.5);
      transform: translateY(-4px);
    }

    /* Progress bar */
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, #667eea, #764ba2);
      transition: width 0.3s ease;
      z-index: 1000;
    }

    /* Navigation */
    .nav-dots {
      position: fixed;
      right: 30px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 100;
    }

    .nav-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .nav-dot:hover {
      background: rgba(255, 255, 255, 0.5);
    }

    .nav-dot.active {
      background: #667eea;
      transform: scale(1.3);
    }

    /* Keyboard hint */
    .keyboard-hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      opacity: 0.5;
      font-size: 12px;
    }

    .key {
      background: rgba(255, 255, 255, 0.1);
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    /* Metric cards */
    .metric-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 30px;
      text-align: center;
    }

    .metric-value {
      font-size: 48px;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Architecture diagram */
    .arch-layer {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px 24px;
      text-align: center;
      position: relative;
    }

    .arch-arrow {
      width: 2px;
      height: 30px;
      background: linear-gradient(180deg, #667eea, transparent);
      margin: 10px auto;
    }

    /* Security badge */
    .security-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 100px;
      font-size: 14px;
      color: #22c55e;
    }

    /* Timeline */
    .timeline-item {
      position: relative;
      padding-left: 30px;
      padding-bottom: 30px;
    }

    .timeline-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 8px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #667eea;
    }

    .timeline-item::after {
      content: '';
      position: absolute;
      left: 5px;
      top: 24px;
      width: 2px;
      height: calc(100% - 16px);
      background: rgba(102, 126, 234, 0.3);
    }

    .timeline-item:last-child::after {
      display: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // Slide data
    const slides = [
      { id: 'title', bg: 'bg-gradient-dark' },

      { id: 'solution', bg: 'bg-gradient-purple' },
      { id: 'interfaces', bg: 'bg-gradient-dark' },

    // Title Slide

          <div className="animate-fade-in opacity-0" style={{animationDelay: '0.1s'}}>
            <div style={{fontSize: '120px', marginBottom: '20px'}}>&#9001;/&#9002;</div>
          </div>
          <h1 className="animate-fade-in opacity-0 glow-text" style={{

            fontWeight: 800,
            marginBottom: '24px',

            Simply MCP
          </h1>
          <p className="animate-fade-in opacity-0" style={{
            fontSize: '28px',
            color: 'rgba(255,255,255,0.7)',

          }}>
            Type-Safe TypeScript Framework for Building MCP Servers
          </p>
          <p className="animate-fade-in opacity-0" style={{
            fontSize: '20px',
            color: 'rgba(255,255,255,0.5)',
            marginTop: '40px',
            animationDelay: '0.4s'
          }}>
            Interface-Driven API &bull; Zero Boilerplate &bull; Full Type Safety
          </p>
          <div className="animate-fade-in opacity-0" style={{

    // Problem Slide
    function ProblemSlide() {
      const problems = [
        { icon: '&#128209;', title: 'Verbose Schema Definitions', desc: 'Manual JSON Schema for every tool parameter' },
        { icon: '&#9881;', title: 'Protocol Boilerplate', desc: 'Repetitive handler registration and routing code' },
        { icon: '&#9888;', title: 'No Type Safety', desc: 'Runtime errors from schema mismatches' },
        { icon: '&#128336;', title: 'Slow Development', desc: 'Hours spent on infrastructure instead of features' },
      ];

      return (
        <div className="flex flex-col justify-center h-full px-16">

            fontSize: '48px',
            fontWeight: 700,
            marginBottom: '16px'
          }}>
            The Problem
          </h2>
          <p className="animate-fade-in opacity-0" style={{

            color: 'rgba(255,255,255,0.6)',
            marginBottom: '60px',

          </p>
          <div style={{display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '24px'}}>
            {problems.map((p, i) => (
              <div key={i} className="feature-card animate-fade-in opacity-0" style={{animationDelay: `${0.2 + i * 0.1}s`}}>
                <div style={{fontSize: '40px', marginBottom: '16px'}} dangerouslySetInnerHTML={{__html: p.icon}} />
                <h3 style={{fontSize: '20px', fontWeight: 600, marginBottom: '8px', color: '#ef4444'}}>{p.title}</h3>
                <p style={{color: 'rgba(255,255,255,0.6)'}}>{p.desc}</p>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // Solution Slide
    function SolutionSlide() {
      return (
        <div className="flex flex-col justify-center h-full px-16">
          <h2 className="animate-fade-in opacity-0" style={{fontSize: '48px', fontWeight: 700, marginBottom: '16px'}}>
            The Simply MCP Solution
          </h2>
          <p className="animate-fade-in opacity-0" style={{fontSize: '24px', color: 'rgba(255,255,255,0.6)', marginBottom: '40px', animationDelay: '0.1s'}}>
            Define servers using pure TypeScript interfaces
          </p>
          <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '40px', alignItems: 'start'}}>
            <div className="animate-fade-in opacity-0" style={{animationDelay: '0.2s'}}>
              <h3 style={{fontSize: '16px', fontWeight: 600, color: 'rgba(255,255,255,0.5)', marginBottom: '16px', textTransform: 'uppercase', letterSpacing: '1px'}}>Define Your Tool</h3>
              <div className="code-block">
                <pre style={{lineHeight: 1.6}}>
{`export const `}<span className="code-function">getWeather</span>{` = `}<span className="code-type">createTool</span>{`({
  description: `}<span className="code-string">'Get current weather'</span>{`,
  params: {
    city: { type: `}<span className="code-string">'string'</span>{` },
    units: {
      type: `}<span className="code-string">'string'</span>{`,
      enum: [`}<span className="code-string">'celsius'</span>{`, `}<span className="code-string">'fahrenheit'</span>{`],
      optional: `}<span className="code-keyword">true</span>{`
    }
  },
  handler: `}<span className="code-keyword">async</span>{` ({ city, units }) => {
    `}<span className="code-keyword">const</span>{` data = `}<span className="code-keyword">await</span>{` fetchWeather(city);
    `}<span className="code-keyword">return</span>{` {
      temp: convert(data.temp, units),
      conditions: data.conditions
    };
  }
});`}
                </pre>
              </div>
            </div>
            <div className="animate-fade-in opacity-0" style={{animationDelay: '0.3s'}}>
              <h3 style={{fontSize: '16px', fontWeight: 600, color: 'rgba(255,255,255,0.5)', marginBottom: '16px', textTransform: 'uppercase', letterSpacing: '1px'}}>Create Server</h3>
              <div className="code-block">
                <pre style={{lineHeight: 1.6}}>
{`export const `}<span className="code-function">server</span>{` = `}<span className="code-type">createServer</span>{`({
  name: `}<span className="code-string">'weather-service'</span>{`,
  version: `}<span className="code-string">'1.0.0'</span>{`,
  description: `}<span className="code-string">'Weather API'</span>{`
});`}
                </pre>
              </div>
              <div style={{marginTop: '24px', display: 'flex', gap: '12px', flexWrap: 'wrap'}}>
                <span className="security-badge">&#10003; Full Type Safety</span>
                <span className="security-badge">&#10003; Auto Schema Gen</span>
                <span className="security-badge">&#10003; IntelliSense</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Interfaces Slide
    function InterfacesSlide() {
      const interfaces = [
        { name: 'createTool()', desc: 'Define callable tools with typed params & results', color: '#667eea' },
        { name: 'createResource()', desc: 'Expose data via URI-based resources', color: '#22c55e' },
        { name: 'createPrompt()', desc: 'Create reusable prompt templates', color: '#f59e0b' },
        { name: 'createApp()', desc: 'Rich UI components with tool integration', color: '#ec4899' },
        { name: 'createAgent()', desc: 'Autonomous LLM-powered entities', color: '#06b6d4' },
        { name: 'createServer()', desc: 'Server config, auth, transports', color: '#8b5cf6' },

      return (
        <div className="flex flex-col justify-center h-full px-16">
          <h2 className="animate-fade-in opacity-0" style={{fontSize: '48px', fontWeight: 700, marginBottom: '16px'}}>
            Factory Functions
          </h2>
          <p className="animate-fade-in opacity-0" style={{fontSize: '24px', color: 'rgba(255,255,255,0.6)', marginBottom: '50px', animationDelay: '0.1s'}}>
            Full type inference. Zero boilerplate. No decorators.
          </p>
          <div style={{display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '20px'}}>
            {interfaces.map((iface, i) => (
              <div key={i} className="feature-card animate-fade-in opacity-0" style={{animationDelay: `${0.2 + i * 0.08}s`}}>
                <div style={{fontSize: '14px', fontWeight: 700, color: iface.color, marginBottom: '8px', fontFamily: 'SF Mono, monospace'}}>
                  {iface.name}
                </div>
                <p style={{fontSize: '14px', color: 'rgba(255,255,255,0.6)', lineHeight: 1.5}}>{iface.desc}</p>
              </div>
            ))}
          </div>
          <div className="animate-fade-in opacity-0" style={{marginTop: '40px', textAlign: 'center', animationDelay: '0.7s'}}>
            <p style={{fontSize: '18px', color: 'rgba(255,255,255,0.5)'}}>
              AST-based extraction generates all protocol schemas automatically
            </p>
          </div>
        </div>
      );
    }

    // MCP-UI Slide
    function McpUiSlide() {
      return (
        <div className="flex flex-col justify-center h-full px-16">
          <h2 className="animate-fade-in opacity-0" style={{fontSize: '48px', fontWeight: 700, marginBottom: '16px'}}>
            MCP-UI: Secure Generated UI
          </h2>
          <p className="animate-fade-in opacity-0" style={{fontSize: '24px', color: 'rgba(255,255,255,0.6)', marginBottom: '50px', animationDelay: '0.1s'}}>
            Return rich, interactive React components with tool results
          </p>
          <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '40px'}}>
            <div>
              <div className="animate-fade-in opacity-0 code-block" style={{animationDelay: '0.2s', marginBottom: '20px'}}>
                <pre style={{lineHeight: 1.6, fontSize: '13px'}}>
{`// Define tool with createTool()
const getStock = `}<span className="code-type">createTool</span>{`({
  description: 'Get stock price',
  handler: ({ ticker }) => ({ ticker, price: 150.25 })
});

`}<span className="code-comment">// Link to UI via IApp</span>{`
const stockApp: `}<span className="code-type">IApp</span>{` = {

              </div>
              <div className="animate-fade-in opacity-0" style={{animationDelay: '0.3s'}}>
                <h4 style={{fontSize: '16px', fontWeight: 600, marginBottom: '16px', color: 'rgba(255,255,255,0.8)'}}>Three MIME Types</h4>
                <div style={{display: 'flex', flexDirection: 'column', gap: '12px'}}>
                  <div style={{display: 'flex', alignItems: 'center', gap: '12px'}}>
                    <span style={{width: '8px', height: '8px', borderRadius: '50%', background: '#667eea'}}></span>
                    <span><strong>text/html</strong> - Inline HTML in sandboxed iframes</span>
                  </div>
                  <div style={{display: 'flex', alignItems: 'center', gap: '12px'}}>
                    <span style={{width: '8px', height: '8px', borderRadius: '50%', background: '#22c55e'}}></span>
                    <span><strong>text/uri-list</strong> - External HTTPS URLs</span>
                  </div>
                  <div style={{display: 'flex', alignItems: 'center', gap: '12px'}}>
                    <span style={{width: '8px', height: '8px', borderRadius: '50%', background: '#f59e0b'}}></span>
                    <span><strong>Remote DOM</strong> - Web Worker isolation</span>
                  </div>
                </div>
              </div>
            </div>
            <div className="animate-fade-in opacity-0" style={{animationDelay: '0.4s'}}>
              <h4 style={{fontSize: '16px', fontWeight: 600, marginBottom: '16px', color: 'rgba(255,255,255,0.8)'}}>Security Model</h4>
              <div className="feature-card" style={{marginBottom: '16px'}}>
                <div style={{display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '12px'}}>
                  <span style={{fontSize: '24px'}}>&#128274;</span>
                  <strong>Sandboxed Execution</strong>
                </div>
                <ul style={{paddingLeft: '20px', color: 'rgba(255,255,255,0.6)', lineHeight: 1.8}}>

              <div style={{display: 'flex', gap: '12px', flexWrap: 'wrap'}}>

                <span className="security-badge">&#10003; React Components</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Progressive Disclosure Slide
    function ProgressiveSlide() {
      return (
        <div className="flex flex-col justify-center h-full px-16">
          <h2 className="animate-fade-in opacity-0" style={{fontSize: '48px', fontWeight: 700, marginBottom: '16px'}}>
            Progressive Disclosure
          </h2>
          <p className="animate-fade-in opacity-0" style={{fontSize: '24px', color: 'rgba(255,255,255,0.6)', marginBottom: '50px', animationDelay: '0.1s'}}>

                </div>
              </div>
              <div className="animate-fade-in opacity-0" style={{animationDelay: '0.3s'}}>

                <div className="metric-card">
                  <div className="metric-value">1,700</div>
                  <div style={{color: 'rgba(255,255,255,0.5)', marginTop: '8px'}}>tokens (66% reduction)</div>
                </div>
              </div>
            </div>
            <div className="animate-fade-in opacity-0" style={{animationDelay: '0.4s'}}>
              <h4 style={{fontSize: '18px', fontWeight: 600, marginBottom: '20px'}}>How It Works</h4>
              <div className="code-block" style={{fontSize: '12px'}}>
                <pre style={{lineHeight: 1.7}}>
{`// Static hiding

  handler: () => { ... }
});

// Dynamic hiding (role-based)

  handler: () => { ... }

// Skill grouping with auto-docs

});`}
                </pre>
              </div>
              <div style={{marginTop: '20px', display: 'flex', gap: '12px', flexWrap: 'wrap'}}>
                <span className="security-badge">&#10003; Context-aware</span>
                <span className="security-badge">&#10003; Compile-time validation</span>

    // Code Execution Slide
    function CodeExecutionSlide() {
      return (
        <div className="flex flex-col justify-center h-full px-16">
          <h2 className="animate-fade-in opacity-0" style={{fontSize: '48px', fontWeight: 700, marginBottom: '16px'}}>
            Secure Code Execution
          </h2>
          <p className="animate-fade-in opacity-0" style={{fontSize: '24px', color: 'rgba(255,255,255,0.6)', marginBottom: '50px', animationDelay: '0.1s'}}>

    // Main Presentation Component
    function Presentation() {
      const [currentSlide, setCurrentSlide] = useState(0);
      const [isTransitioning, setIsTransitioning] = useState(false);

      const goToSlide = useCallback((index) => {
        if (index >= 0 && index < slides.length && !isTransitioning) {
          setIsTransitioning(true);
          setCurrentSlide(index);
          setTimeout(() => setIsTransitioning(false), 500);
        }
      }, [isTransitioning]);

      const nextSlide = useCallback(() => goToSlide(currentSlide + 1), [currentSlide, goToSlide]);
      const prevSlide = useCallback(() => goToSlide(currentSlide - 1), [currentSlide, goToSlide]);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') {
            e.preventDefault();
            nextSlide();
          } else if (e.key === 'ArrowLeft' || e.key === 'Backspace') {
            e.preventDefault();
            prevSlide();
          } else if (e.key >= '1' && e.key <= '9') {
            goToSlide(parseInt(e.key) - 1);
          } else if (e.key === '0') {
            goToSlide(9);
          }
        };

        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [nextSlide, prevSlide, goToSlide]);

      const slideComponents = {
        'title': TitleSlide,
        'problem': ProblemSlide,
        'solution': SolutionSlide,
        'interfaces': InterfacesSlide,
        'mcp-ui': McpUiSlide,
        'progressive': ProgressiveSlide,
        'code-execution': CodeExecutionSlide,
        'agents': AgentsSlide,
        'security': SecuritySlide,
        'metrics': MetricsSlide,
        'value': ValueSlide,
        'future': FutureSlide,
      };

      const CurrentSlideComponent = slideComponents[slides[currentSlide].id];
      const progress = ((currentSlide + 1) / slides.length) * 100;

      return (
        <div style={{width: '100vw', height: '100vh', position: 'relative'}}>
          {/* Progress bar */}
          <div className="progress-bar" style={{width: `${progress}%`}} />

          {/* Slide content */}
          <div
            key={currentSlide}
            className={slides[currentSlide].bg}
            style={{
              width: '100%',
              height: '100%',
              transition: 'opacity 0.5s ease',
              opacity: isTransitioning ? 0.5 : 1
            }}
          >
            <CurrentSlideComponent />
          </div>

          {/* Navigation dots */}
          <div className="nav-dots">
            {slides.map((_, i) => (
              <div
                key={i}
                className={`nav-dot ${i === currentSlide ? 'active' : ''}`}
                onClick={() => goToSlide(i)}
              />
            ))}
          </div>

          {/* Keyboard hint */}
          <div className="keyboard-hint">
            <span className="key">&#8592;</span>
            <span className="key">&#8594;</span>
            <span style={{marginLeft: '8px'}}>Navigate</span>
          </div>

          {/* Slide counter */}
          <div style={{
            position: 'fixed',
            bottom: '20px',
            right: '30px',
            fontSize: '14px',
            color: 'rgba(255,255,255,0.4)'
          }}>
            {currentSlide + 1} / {slides.length}
          </div>
        </div>
      );
    }

    // Render
    ReactDOM.createRoot(document.getElementById('root')).render(<Presentation />);
  </script>
